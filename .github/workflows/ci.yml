name: CI

on:
  push:
    branches: [main, master, "overnight/**"]
  pull_request:
    branches: [main, master, "overnight/**"]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Typecheck
        run: pnpm exec tsc --noEmit -p tsconfig.json

      - name: Unit tests (core suite)
        run: >
          pnpm exec vitest run
          server/chapterDetect.test.ts
          server/gatePipeline.test.ts
          server/readingPipeline.test.ts
          server/pricingService.test.ts
          server/core.test.ts
          server/renderCap.test.ts
          server/booksRouter.retryFailedPages.test.ts
          server/booksRouter.getProgress.test.ts
